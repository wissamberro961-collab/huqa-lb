<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HUQA.LB — أدمن</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --orange:#ff6b00; --orange2:#ff8c35;
  --dark:#0d0d0d; --card:#1a1a1a; --card2:#222;
  --border:#2e2e2e; --text:#f0f0f0; --muted:#888;
  --danger:#e03c3c; --success:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a0a00,#0d0d0d 70%);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 0 60px rgba(255,107,0,0.15);}
.l-logo{font-size:2.2rem;font-weight:900;color:var(--orange);letter-spacing:2px;margin-bottom:6px;}
.l-sub{color:var(--muted);font-size:0.85rem;margin-bottom:32px;}
.login-box input{width:100%;padding:14px 18px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:1rem;margin-bottom:14px;text-align:center;letter-spacing:3px;transition:border-color .2s;}
.login-box input:focus{outline:none;border-color:var(--orange);}
.btn-login{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-login:hover{background:var(--orange2);}
.l-err{color:var(--danger);font-size:.85rem;margin-top:12px;display:none;}

#panel{display:none;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.h-logo{font-size:1.4rem;font-weight:900;color:var(--orange);}
.h-sub{font-size:.85rem;color:var(--muted);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

.stats{display:flex;gap:16px;padding:20px 24px;flex-wrap:wrap;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 24px;flex:1;min-width:100px;text-align:center;}
.stat-n{font-size:2rem;font-weight:900;color:var(--orange);}
.stat-l{font-size:.78rem;color:var(--muted);margin-top:2px;}

.layout{display:grid;grid-template-columns:360px 1fr;gap:24px;padding:0 24px 40px;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}}

.form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;position:sticky;top:80px;height:fit-content;}
.form-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.form-title span{color:var(--orange);font-size:1.3rem;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px;font-weight:600;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.9rem;transition:border-color .2s;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--orange);}
.fg select option{background:var(--card2);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.check-row{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;cursor:pointer;}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--orange);cursor:pointer;}
.check-row label{font-size:.9rem;cursor:pointer;}
.form-actions{display:flex;gap:10px;margin-top:18px;}
.btn-save{flex:1;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;}
.btn-save:hover{background:var(--orange2);}
.btn-save:active{transform:scale(.98);}
.btn-cancel{padding:13px 18px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;font-family:'Cairo',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--danger);color:var(--danger);}

.prods-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.prods-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.prods-head h2{font-size:1.05rem;font-weight:700;}
.search{padding:9px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;font-size:.85rem;width:200px;transition:border-color .2s;}
.search:focus{outline:none;border-color:var(--orange);}
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);padding:0 24px;}
.tab{padding:12px 18px;background:transparent;border:none;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab:hover{color:var(--text);}
table{width:100%;border-collapse:collapse;}
th{padding:12px 16px;font-size:.78rem;color:var(--muted);font-weight:600;text-align:right;background:var(--card2);border-bottom:1px solid var(--border);}
td{padding:14px 16px;font-size:.88rem;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,107,0,.04);}
.prod-img{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--border);background:var(--card2);}
.pname{font-weight:700;font-size:.9rem;}
.pname-en{font-size:.78rem;color:var(--muted);margin-top:2px;}
.price-tag{color:var(--orange);font-weight:700;font-size:.95rem;white-space:nowrap;}
.cbadge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;background:rgba(255,107,0,.15);color:var(--orange);border:1px solid rgba(255,107,0,.3);}
.nbadge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:.7rem;font-weight:700;background:rgba(39,174,96,.15);color:var(--success);border:1px solid rgba(39,174,96,.3);}
.acts{display:flex;gap:8px;}
.btn-edit,.btn-del{padding:7px 14px;border-radius:7px;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.btn-edit{background:rgba(255,107,0,.15);color:var(--orange);border:1px solid rgba(255,107,0,.3);}
.btn-edit:hover{background:var(--orange);color:#fff;}
.btn-del{background:rgba(224,60,60,.1);color:var(--danger);border:1px solid rgba(224,60,60,.3);}
.btn-del:hover{background:var(--danger);color:#fff;}
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.loading-r td{text-align:center;padding:40px;color:var(--muted);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--success);color:#fff;padding:13px 28px;border-radius:10px;font-weight:700;font-size:.95rem;transition:transform .3s;z-index:9999;}
.toast.err{background:var(--danger);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="l-logo">HUQA.LB</div>
    <div class="l-sub">لوحة تحكم الأدمن</div>
    <input type="password" id="pass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="l-err" id="l-err">❌ كلمة المرور غلط</div>
  </div>
</div>

<div id="panel">
  <header>
    <div><div class="h-logo">HUQA.LB</div><div class="h-sub">لوحة تحكم الأدمن</div></div>
    <button class="btn-logout" onclick="logout()">خروج ←</button>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">إجمالي</div></div>
    <div class="stat"><div class="stat-n" id="s-shisha">—</div><div class="stat-l">شيشة</div></div>
    <div class="stat"><div class="stat-n" id="s-vape">—</div><div class="stat-l">فيب</div></div>
    <div class="stat"><div class="stat-n" id="s-acc">—</div><div class="stat-l">إكسسوارات</div></div>
    <div class="stat"><div class="stat-n" id="s-new">—</div><div class="stat-l">جديد</div></div>
  </div>

  <div class="layout">
    <div class="form-card">
      <div class="form-title"><span id="form-icon">＋</span><span id="form-ttl">إضافة منتج جديد</span></div>
      <input type="hidden" id="edit-id"/>

      <div class="row2">
        <div class="fg"><label>الاسم عربي *</label><input type="text" id="f-nar" placeholder="مثال: شيشة فاخرة"/></div>
        <div class="fg"><label>الاسم إنجليزي</label><input type="text" id="f-nen" placeholder="Fancy Shisha"/></div>
      </div>
      <div class="fg"><label>الوصف عربي</label><textarea id="f-dar" rows="2" placeholder="وصف المنتج..."></textarea></div>
      <div class="fg"><label>الوصف إنجليزي</label><textarea id="f-den" rows="2" placeholder="Product description..."></textarea></div>
      <div class="row2">
        <div class="fg"><label>السعر (USD) *</label><input type="number" id="f-price" placeholder="0.00" step="0.01" min="0"/></div>
        <div class="fg"><label>الفئة *</label>
          <select id="f-cat">
            <option value="">— اختر —</option>
            <option value="shisha">شيشة</option>
            <option value="vape">فيب</option>
            <option value="accessories">إكسسوارات</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>رابط الصورة (imgbb.com)</label><input type="text" id="f-img" placeholder="https://i.ibb.co/..."/></div>
      <div class="fg">
        <div class="check-row">
          <input type="checkbox" id="f-new"/>
          <label for="f-new">🆕 تمييز كـ "جديد"</label>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="save()">💾 حفظ</button>
        <button class="btn-cancel" id="btn-cancel" onclick="reset()" style="display:none">إلغاء</button>
      </div>
    </div>

    <div>
      <div class="prods-card">
        <div class="prods-head">
          <h2>📦 المنتجات</h2>
          <input class="search" type="text" placeholder="🔍 بحث..." oninput="doSearch(this.value)"/>
        </div>
        <div class="tabs">
          <button class="tab active" onclick="setTab('all',this)">الكل</button>
          <button class="tab" onclick="setTab('shisha',this)">شيشة</button>
          <button class="tab" onclick="setTab('vape',this)">فيب</button>
          <button class="tab" onclick="setTab('accessories',this)">إكسسوارات</button>
          <button class="tab" onclick="setTab('new',this)">🆕 جديد</button>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>صورة</th><th>المنتج</th><th>الفئة</th><th>السعر</th><th>إجراءات</th></tr></thead>
            <tbody id="tbody"><tr class="loading-r"><td colspan="5">⏳ جار التحميل...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://isgxxcknxmqytkmkvlgz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZ3h4Y2tueG1xeXRrbWt2bGd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTY1MzIsImV4cCI6MjA5NDUzMjUzMn0.iI_wxLJUPQQ_0YSkiw83fKSukJR5nn1zW1vMegad5cw';
const PASS = 'huqalb1234';
const TBL  = 'products';

let all = [], tab = 'all', q = '';
const CATS = { shisha:'شيشة', vape:'فيب', accessories:'إكسسوارات' };

function login(){
  if(document.getElementById('pass').value === PASS){
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    load();
  } else {
    const e = document.getElementById('l-err');
    e.style.display = 'block';
    document.getElementById('pass').value = '';
    setTimeout(() => e.style.display = 'none', 2500);
  }
}

function logout(){
  document.getElementById('login').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('pass').value = '';
}

async function sb(path, method = 'GET', body = null){
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if(!r.ok){ const e = await r.json(); throw new Error(e.message || 'Error'); }
  if(method === 'DELETE' || r.status === 204) return null;
  return r.json();
}

async function load(){
  try {
    const data = await sb(`${TBL}?order=created_at.desc`);
    all = data; render(); stats();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr class="loading-r"><td colspan="5" style="color:var(--danger)">❌ ${e.message}</td></tr>`;
  }
}

function filtered(){
  return all.filter(p => {
    const mt = tab === 'all' ? true : tab === 'new' ? p.is_new : p.category === tab;
    const ms = !q || (p.name_ar||'').includes(q) || (p.name_en||'').toLowerCase().includes(q.toLowerCase());
    return mt && ms;
  });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(){
  const list = filtered();
  const tb = document.getElementById('tbody');
  if(!list.length){ tb.innerHTML = '<tr><td colspan="5"><div class="empty">📦 لا يوجد منتجات</div></td></tr>'; return; }
  tb.innerHTML = list.map(p => `
    <tr>
      <td>${p.image_url
        ? `<img class="prod-img" src="${esc(p.image_url)}" alt="" onerror="this.style.display='none'"/>`
        : `<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#555;font-size:1.4rem">📷</div>`}
      </td>
      <td>
        <div class="pname">${esc(p.name_ar||'')}</div>
        ${p.name_en ? `<div class="pname-en">${esc(p.name_en)}</div>` : ''}
        ${p.is_new ? '<span class="nbadge">جديد</span>' : ''}
      </td>
      <td>${p.category ? `<span class="cbadge">${CATS[p.category]||p.category}</span>` : '—'}</td>
      <td><span class="price-tag">$${Number(p.price).toFixed(2)}</span></td>
      <td><div class="acts">
        <button class="btn-edit" onclick="edit(${p.id})">✏️ تعديل</button>
        <button class="btn-del"  onclick="del(${p.id},'${esc(p.name_ar||'')}')">🗑️</button>
      </div></td>
    </tr>
  `).join('');
}

function stats(){
  document.getElementById('s-total').textContent  = all.length;
  document.getElementById('s-shisha').textContent = all.filter(p => p.category === 'shisha').length;
  document.getElementById('s-vape').textContent   = all.filter(p => p.category === 'vape').length;
  document.getElementById('s-acc').textContent    = all.filter(p => p.category === 'accessories').length;
  document.getElementById('s-new').textContent    = all.filter(p => p.is_new).length;
}

function setTab(t, el){ tab = t; document.querySelectorAll('.tab').forEach(b => b.classList.remove('active')); el.classList.add('active'); render(); }
function doSearch(v){ q = v; render(); }

async function save(){
  const nar   = document.getElementById('f-nar').value.trim();
  const nen   = document.getElementById('f-nen').value.trim();
  const dar   = document.getElementById('f-dar').value.trim();
  const den   = document.getElementById('f-den').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const cat   = document.getElementById('f-cat').value;
  const img   = document.getElementById('f-img').value.trim();
  const isNew = document.getElementById('f-new').checked;
  const eid   = document.getElementById('edit-id').value;

  if(!nar) return toast('لازم تحط اسم عربي', true);
  if(isNaN(price) || price < 0) return toast('السعر غلط', true);
  if(!cat) return toast('اختر فئة', true);

  const payload = { name_ar:nar, name_en:nen, desc_ar:dar, desc_en:den, price, category:cat, image_url:img||null, is_new:isNew };

  try {
    if(eid){ await sb(`${TBL}?id=eq.${eid}`, 'PATCH', payload); toast('✅ تم التعديل'); }
    else   { await sb(TBL, 'POST', payload); toast('✅ تمت الإضافة'); }
    reset(); await load();
  } catch(e){ toast('❌ ' + e.message, true); }
}

function edit(id){
  const p = all.find(x => x.id === id); if(!p) return;
  document.getElementById('edit-id').value  = id;
  document.getElementById('f-nar').value   = p.name_ar || '';
  document.getElementById('f-nen').value   = p.name_en || '';
  document.getElementById('f-dar').value   = p.desc_ar || '';
  document.getElementById('f-den').value   = p.desc_en || '';
  document.getElementById('f-price').value = p.price || '';
  document.getElementById('f-cat').value   = p.category || '';
  document.getElementById('f-img').value   = p.image_url || '';
  document.getElementById('f-new').checked = !!p.is_new;
  document.getElementById('form-ttl').textContent  = 'تعديل المنتج';
  document.getElementById('form-icon').textContent = '✏️';
  document.getElementById('btn-cancel').style.display = 'block';
  document.querySelector('.form-card').scrollIntoView({ behavior:'smooth' });
}

async function del(id, name){
  if(!confirm(`هل تريد حذف "${name}"؟`)) return;
  try { await sb(`${TBL}?id=eq.${id}`, 'DELETE'); toast('🗑️ تم الحذف'); await load(); }
  catch(e){ toast('❌ ' + e.message, true); }
}

function reset(){
  ['edit-id','f-nar','f-nen','f-dar','f-den','f-price','f-img'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-cat').value   = '';
  document.getElementById('f-new').checked = false;
  document.getElementById('form-ttl').textContent  = 'إضافة منتج جديد';
  document.getElementById('form-icon').textContent = '＋';
  document.getElementById('btn-cancel').style.display = 'none';
}

function toast(msg, err = false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' err' : '') + ' show';
  setTimeout(() => t.className = 'toast' + (err ? ' err' : ''), 3000);
}
</script>
</body>
</html>
