<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HUQA.LB — شيشة وفيب</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --orange: #ff6b00;
  --orange2: #ff8c35;
  --dark: #0d0d0d;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #888;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.announce-bar {
  background: var(--orange);
  color: #fff;
  text-align: center;
  padding: 9px 16px;
  font-size: 0.85rem;
  font-weight: 700;
}

nav {
  background: rgba(13,13,13,0.96);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.nav-logo { font-size: 1.6rem; font-weight: 900; color: var(--orange); letter-spacing: 2px; }

.lang-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 16px;
  border-radius: 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-btn:hover { border-color: var(--orange); color: var(--orange); }

.hero {
  position: relative;
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #1f0a00 0%, #0d0d0d 70%);
}

.smoke-wrap { position: absolute; inset: 0; pointer-events: none; }

.smoke {
  position: absolute;
  bottom: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,107,0,0.15) 0%, transparent 70%);
  animation: rise linear infinite;
}

@keyframes rise {
  0%   { transform: translateY(0) scale(1); opacity: 0.8; }
  100% { transform: translateY(-420px) scale(3.5); opacity: 0; }
}

.hero-content { position: relative; text-align: center; }

.hero-logo {
  font-size: clamp(3rem, 12vw, 6rem);
  font-weight: 900;
  color: var(--orange);
  letter-spacing: 4px;
  text-shadow: 0 0 50px rgba(255,107,0,0.5);
  line-height: 1;
}

.hero-sub { font-size: 0.95rem; color: var(--muted); margin-top: 10px; letter-spacing: 1px; }

.filters-section { padding: 24px 20px 0; max-width: 1100px; margin: 0 auto; }

.cat-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.cat-btn {
  padding: 8px 20px;
  border-radius: 25px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Cairo', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.cat-btn:hover { border-color: var(--orange); color: var(--orange); }
.cat-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

.sort-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.sort-label { font-size: 0.8rem; color: var(--muted); }

.sort-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Cairo', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.sort-btn:hover, .sort-btn.active { border-color: var(--orange); color: var(--orange); }

.products-section { max-width: 1100px; margin: 0 auto; padding: 24px 20px 40px; }

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 18px;
}

.prod-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.prod-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,107,0,0.35);
  box-shadow: 0 8px 30px rgba(255,107,0,0.1);
}

.prod-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background: #141414;
  overflow: hidden;
}

.prod-img-wrap img { width:100%; height:100%; object-fit:cover; transition: transform 0.3s; }
.prod-card:hover .prod-img-wrap img { transform: scale(1.05); }

.no-img { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3rem; color:#333; }

.new-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: var(--orange);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 900;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.prod-info { padding: 14px; }
.prod-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; line-height: 1.3; }
.prod-desc {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.prod-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.prod-price { font-size: 1.05rem; font-weight: 900; color: var(--orange); }

.wa-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #25d366;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}
.wa-btn:hover { background: #1ebd5a; }
.wa-btn:active { transform: scale(0.96); }

.loading-state, .empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.contact-section {
  border-top: 1px solid var(--border);
  padding: 40px 20px;
  text-align: center;
}
.contact-title { font-size: 1.1rem; font-weight: 700; color: var(--orange); margin-bottom: 20px; }
.contact-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.contact-link {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 22px; border-radius: 10px;
  font-family: 'Cairo', sans-serif; font-size: 0.9rem; font-weight: 700;
  text-decoration: none; transition: transform 0.2s, opacity 0.2s;
}
.contact-link:hover { transform: translateY(-2px); opacity: 0.85; }
.wa-link { background: #25d366; color: #fff; }
.ig-link { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:#fff; }

footer {
  border-top: 1px solid var(--border);
  padding: 20px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--muted);
}

.float-wa {
  position: fixed;
  bottom: 24px; left: 24px;
  width: 56px; height: 56px;
  background: #25d366;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(37,211,102,0.4);
  z-index: 200;
  animation: pulse 2s ease-in-out infinite;
  transition: transform 0.2s;
}
.float-wa:hover { transform: scale(1.1); }
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); }
  50%      { box-shadow: 0 4px 32px rgba(37,211,102,0.7); }
}

@media (max-width: 600px) {
  .products-grid { grid-template-columns: repeat(2,1fr); gap: 12px; }
  .prod-info { padding: 10px; }
  .prod-name { font-size: 0.85rem; }
  .hero { height: 260px; }
}
</style>
</head>
<body>

<div class="announce-bar" id="announce-bar">🚚 توصيل لكل لبنان — الدفع عند الاستلام 💰</div>

<nav>
  <div class="nav-logo">HUQA.LB</div>
  <button class="lang-btn" onclick="toggleLang()">EN / عر</button>
</nav>

<div class="hero">
  <div class="smoke-wrap" id="smoke-wrap"></div>
  <div class="hero-content">
    <div class="hero-logo">HUQA.LB</div>
    <div class="hero-sub" id="hero-sub">شيشة • فيب • إكسسوارات</div>
  </div>
</div>

<div class="filters-section">
  <div class="cat-filters">
    <button class="cat-btn active" data-cat="all"         onclick="setCat(this)">الكل</button>
    <button class="cat-btn"        data-cat="new"         onclick="setCat(this)">🆕 جديد</button>
    <button class="cat-btn"        data-cat="shisha"      onclick="setCat(this)">شيشة</button>
    <button class="cat-btn"        data-cat="vape"        onclick="setCat(this)">فيب</button>
    <button class="cat-btn"        data-cat="accessories" onclick="setCat(this)">إكسسوارات</button>
  </div>
  <div class="sort-row">
    <span class="sort-label" id="sort-label">ترتيب:</span>
    <button class="sort-btn active" data-sort="newest" onclick="setSort(this)">الأحدث</button>
    <button class="sort-btn"        data-sort="low"    onclick="setSort(this)">الأرخص</button>
    <button class="sort-btn"        data-sort="high"   onclick="setSort(this)">الأغلى</button>
  </div>
</div>

<div class="products-section">
  <div class="products-grid" id="grid">
    <div class="loading-state"><div class="spinner"></div><p>جار التحميل...</p></div>
  </div>
</div>

<div class="contact-section">
  <div class="contact-title" id="contact-title">📞 تواصل معنا</div>
  <div class="contact-links">
    <a href="https://wa.me/96171392434" target="_blank" class="contact-link wa-link">💬 واتساب</a>
    <a href="https://instagram.com/huqa.vape" target="_blank" class="contact-link ig-link">📷 @huqa.vape</a>
    <a href="https://instagram.com/huqa.lbb"  target="_blank" class="contact-link ig-link">📷 @huqa.lbb</a>
  </div>
</div>

<footer>HUQA.LB © 2025 — شيشة وفيب | لبنان</footer>

<a href="https://wa.me/96171392434" target="_blank" class="float-wa">💬</a>

<script>
const SUPABASE_URL = 'https://isgxxcknxmqytkmkvlgz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZ3h4Y2tueG1xeXRrbWt2bGd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTY1MzIsImV4cCI6MjA5NDUzMjUzMn0.iI_wxLJUPQQ_0YSkiw83fKSukJR5nn1zW1vMegad5cw';
const WA = '96171392434';

let products = [], cat = 'all', sort = 'newest', ar = true;

const T = {
  ar: {
    announce: '🚚 توصيل لكل لبنان — الدفع عند الاستلام 💰',
    sub: 'شيشة • فيب • إكسسوارات',
    cats: ['الكل','🆕 جديد','شيشة','فيب','إكسسوارات'],
    sorts: ['الأحدث','الأرخص','الأغلى'],
    sortLbl: 'ترتيب:',
    contact: '📞 تواصل معنا',
    wa: 'اطلب الآن',
    empty: 'لا يوجد منتجات',
    msg: 'مرحبا، بدي أطلب: '
  },
  en: {
    announce: '🚚 Delivery all over Lebanon — Cash on Delivery 💰',
    sub: 'Shisha • Vape • Accessories',
    cats: ['All','🆕 New','Shisha','Vape','Accessories'],
    sorts: ['Newest','Cheapest','Most Expensive'],
    sortLbl: 'Sort:',
    contact: '📞 Contact Us',
    wa: 'Order Now',
    empty: 'No products found',
    msg: 'Hi, I want to order: '
  }
};

// SMOKE
(function(){
  const w = document.getElementById('smoke-wrap');
  for(let i = 0; i < 9; i++){
    const d = document.createElement('div');
    d.className = 'smoke';
    const sz = 50 + Math.random() * 120;
    d.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*6}s;`;
    w.appendChild(d);
  }
})();

async function load(){
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/products?order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    products = await r.json();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty-state">❌ خطأ في التحميل</div>';
  }
}

function render(){
  const t = ar ? T.ar : T.en;
  let list = [...products];
  if(cat === 'new')       list = list.filter(p => p.is_new);
  else if(cat !== 'all')  list = list.filter(p => p.category === cat);
  if(sort === 'low')      list.sort((a,b) => a.price - b.price);
  else if(sort === 'high') list.sort((a,b) => b.price - a.price);

  const grid = document.getElementById('grid');
  if(!list.length){ grid.innerHTML = `<div class="empty-state">📦 ${t.empty}</div>`; return; }

  grid.innerHTML = list.map(p => {
    const name = ar ? (p.name_ar || p.name_en || '') : (p.name_en || p.name_ar || '');
    const desc = ar ? (p.desc_ar || p.desc_en || '') : (p.desc_en || p.desc_ar || '');
    const msg  = encodeURIComponent(t.msg + name);
    return `<div class="prod-card">
      <div class="prod-img-wrap">
        ${p.image_url ? `<img src="${p.image_url}" alt="${name}" loading="lazy"/>` : '<div class="no-img">🛒</div>'}
        ${p.is_new ? '<div class="new-badge">NEW</div>' : ''}
      </div>
      <div class="prod-info">
        <div class="prod-name">${name}</div>
        ${desc ? `<div class="prod-desc">${desc}</div>` : ''}
        <div class="prod-footer">
          <span class="prod-price">$${Number(p.price).toFixed(2)}</span>
          <a href="https://wa.me/${WA}?text=${msg}" target="_blank" class="wa-btn">💬 ${t.wa}</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCat(el){
  cat = el.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setSort(el){
  sort = el.dataset.sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleLang(){
  ar = !ar;
  const t = ar ? T.ar : T.en;
  document.documentElement.lang = ar ? 'ar' : 'en';
  document.documentElement.dir  = ar ? 'rtl' : 'ltr';
  document.getElementById('announce-bar').textContent  = t.announce;
  document.getElementById('hero-sub').textContent      = t.sub;
  document.getElementById('contact-title').textContent = t.contact;
  document.getElementById('sort-label').textContent    = t.sortLbl;
  document.querySelectorAll('.cat-btn').forEach((b,i) => b.textContent = t.cats[i]);
  document.querySelectorAll('.sort-btn').forEach((b,i) => b.textContent = t.sorts[i]);
  render();
}

load();
</script>
</body>
</html>
